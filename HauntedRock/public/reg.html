<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - haunted.rock</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: rgb(56, 122, 255); 
            --dark-text: #1d1d1f;
            --gray-text: #86868b;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e8ecf2 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            --blur: blur(25px);
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Lexend', sans-serif; 
            background: var(--bg-gradient); 
            color: var(--dark-text); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Декоративные круги на фоне для эффекта стекла */
        .bg-blob { position: absolute; border-radius: 50%; filter: blur(60px); z-index: -1; opacity: 0.6; }
        .blob-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: rgba(56, 122, 255, 0.3); }
        .blob-2 { bottom: -10%; right: -5%; width: 500px; height: 500px; background: rgba(142, 45, 226, 0.2); }

        .container { display: flex; max-width: 1000px; width: 100%; align-items: center; justify-content: space-between; gap: 60px; position: relative; z-index: 1;}
        
        /* Левая часть (Бренд) */
        .brand-col { flex: 1; padding-right: 30px; animation: slideInLeft 0.8s ease-out; }
        .logo-area { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .logo-text { font-size: 4rem; font-weight: 800; color: var(--dark-text); letter-spacing: -2px; line-height: 1; text-transform: lowercase; }
        .logo-text span { color: var(--primary-blue); margin: 0 2px; }
        .tagline { font-size: 1.8rem; font-weight: 500; color: var(--gray-text); line-height: 1.4; }

        /* Правая часть (Форма - Liquid Glass) */
        .form-col { flex: 0 0 420px; animation: popIn 0.6s ease-out; }
        
        .card { 
            background: var(--glass-bg); 
            backdrop-filter: var(--blur); 
            -webkit-backdrop-filter: var(--blur); 
            padding: 40px; 
            border-radius: 30px; 
            border: 1px solid var(--glass-border); 
            box-shadow: var(--shadow); 
            text-align: center; 
        }

        .form-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 25px; color: var(--dark-text); letter-spacing: -0.5px;}
        
        /* Стеклянные инпуты */
        .input-group { margin-bottom: 15px; }
        input { 
            width: 100%; padding: 16px 20px; border-radius: 50px; 
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.5), 0 4px 15px rgba(0,0,0,0.03);
            color: var(--dark-text); outline: none; font-size: 1rem; font-family: inherit; transition: 0.3s; 
        }
        input::placeholder { color: #999; }
        input:focus { border-color: var(--primary-blue); background: rgba(255, 255, 255, 0.7); }

        /* Капча */
        .captcha-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .captcha-img-wrapper { 
            flex: 1; height: 52px; background: rgba(255,255,255,0.6); border-radius: 50px; 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.8); cursor: pointer; transition: 0.2s;
        }
        .captcha-img-wrapper:hover { transform: scale(1.02); }
        .captcha-input { flex: 1; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-align: center;}

        /* Кнопки */
        .btn-submit { 
            width: 100%; background-color: var(--primary-blue); color: white; padding: 16px; 
            border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 600; 
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(56, 122, 255, 0.3);
            font-family: inherit;
        }
        .btn-submit:hover { background-color: #1a5cff; transform: translateY(-3px); box-shadow: 0 15px 35px rgba(56, 122, 255, 0.4); }

        .divider { border-bottom: 1px solid rgba(0,0,0,0.05); margin: 25px 0; }
        
        .btn-switch { 
            width: 100%; display: inline-block; background-color: rgba(255,255,255,0.5); color: var(--dark-text); 
            padding: 16px; border-radius: 50px; font-weight: 600; text-decoration: none; 
            font-size: 1rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.8); transition: 0.3s;
            font-family: inherit;
        }
        .btn-switch:hover { background-color: var(--white); color: var(--primary-blue); transform: translateY(-2px);}
        
        .error-msg { color: #ff4d4d; font-size: 0.9rem; margin-top: 15px; display: none; font-weight: 500;}
        .hidden { display: none; }

        /* Анимации */
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        @media (max-width: 900px) {
            .container { flex-direction: column; text-align: center; gap: 40px; }
            .brand-col { padding-right: 0; }
            .logo-area { justify-content: center; }
            .logo-text { font-size: 3.5rem; }
            .form-col { width: 100%; max-width: 420px; }
        }
    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="container">
        <div class="brand-col">
            <div class="logo-area">
                <div class="logo-text">haunted<span>.</span>rock</div>
            </div>
            <h2 class="tagline">Join the closed community. <br>Share your aesthetic.</h2>
        </div>

        <div class="form-col">
            <div class="card">
                
                <div id="signup-box">
                    <div class="form-title">Create Account</div>
                    <form id="regForm"> 
                        <div class="input-group"><input type="text" id="reg-username" placeholder="Username" required></div>
                        <div class="input-group"><input type="email" id="reg-email" placeholder="Email Address" required></div>
                        <div class="input-group"><input type="password" id="reg-password" placeholder="Password" required></div>
                        
                        <div class="captcha-row">
                            <div class="captcha-img-wrapper" id="reg-captcha-img" title="Click to refresh"></div>
                            <input type="text" id="reg-captcha-input" class="captcha-input clean-input" placeholder="CODE" required>
                        </div>
                        
                        <button type="submit" class="btn-submit">Sign Up</button>
                        <div id="reg-error" class="error-msg"></div>
                    </form>
                    
                    <div class="divider"></div>
                    <button onclick="showLogin()" class="btn-switch">Log In Instead</button>
                </div>

                <div id="login-box" class="hidden">
                    <div class="form-title">Welcome Back</div>
                    <form id="loginForm"> 
                        <div class="input-group"><input type="text" id="login-id" placeholder="Email or Username" required></div>
                        <div class="input-group"><input type="password" id="login-pass" placeholder="Password" required></div>
                        
                        <div class="captcha-row">
                            <div class="captcha-img-wrapper" id="login-captcha-img" title="Click to refresh"></div>
                            <input type="text" id="login-captcha-input" class="captcha-input clean-input" placeholder="CODE" required>
                        </div>
                        
                        <button type="submit" class="btn-submit">Log In</button>
                        <div id="login-error" class="error-msg"></div>
                    </form>

                    <div class="divider"></div>
                    <button onclick="showSignup()" class="btn-switch">Create New Account</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Функция загрузки капчи в нужный контейнер
        function loadCaptcha(containerId) {
            fetch('/api/captcha')
                .then(res => res.text())
                .then(data => {
                    document.getElementById(containerId).innerHTML = data;
                });
        }

        // --- ПЕРЕКЛЮЧЕНИЕ ФОРМ ---
        function showLogin() {
            document.getElementById('signup-box').classList.add('hidden');
            document.getElementById('login-box').classList.remove('hidden');
            loadCaptcha('login-captcha-img'); // Обновляем капчу при переходе
        }

        function showSignup() {
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('signup-box').classList.remove('hidden');
            loadCaptcha('reg-captcha-img'); // Обновляем капчу при переходе
        }

        // Инициализация (показываем регистрацию)
        loadCaptcha('reg-captcha-img');
        
        // Клик по капче для обновления
        document.getElementById('reg-captcha-img').addEventListener('click', () => loadCaptcha('reg-captcha-img'));
        document.getElementById('login-captcha-img').addEventListener('click', () => loadCaptcha('login-captcha-img'));

        // --- ОБРАБОТКА РЕГИСТРАЦИИ ---
        document.getElementById('regForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errDiv = document.getElementById('reg-error');
            
            // Запоминаем то, что ввел пользователь
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const captcha = document.getElementById('reg-captcha-input').value;

            try {
                const res = await fetch('/api/register', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, email, password, captcha })
                });
                const data = await res.json();

                if (data.success) {
                    // ИСПРАВЛЕНИЕ: Берем ник из переменной username, а не из data.username
                    localStorage.setItem('haunted_user', username);
                    window.location.href = '/';
                } else {
                    errDiv.innerText = data.message;
                    errDiv.style.display = 'block';
                    loadCaptcha('reg-captcha-img');
                    document.getElementById('reg-captcha-input').value = '';
                }
            } catch (error) {
                console.error("Registration error:", error);
            }
        });
        // --- ОБРАБОТКА ВХОДА (LOGIN) ---
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errDiv = document.getElementById('login-error');

            const identifier = document.getElementById('login-id').value;
            const password = document.getElementById('login-pass').value;
            const captcha = document.getElementById('login-captcha-input').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ identifier, password, captcha })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('haunted_user', data.username);
                    window.location.href = '/';
                } else {
                    errDiv.innerText = data.message;
                    errDiv.style.display = 'block';
                    loadCaptcha('login-captcha-img');
                    document.getElementById('login-captcha-input').value = '';
                }
            } catch (error) {
                console.error("Login error:", error);
            }
        });

        // Если уже вошел
        if (localStorage.getItem('haunted_user')) window.location.href = '/';

    </script>
</body>

</html>
