<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock.ai - Chat</title>
    
    <script>
        // Проверка авторизации
        if (!localStorage.getItem('haunted_user')) window.location.href = '/reg';
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root { 
            --primary-blue: rgb(56, 122, 255); 
            --dark-text: #1d1d1f; 
            --gray-text: #86868b; 
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e8ecf2 100%);
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
            --blur: blur(25px);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Lexend', sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            color: var(--dark-text); 
            overflow: hidden; 
            background: var(--bg-gradient); 
        }

        .bg-blob { position: absolute; border-radius: 50%; filter: blur(60px); z-index: -1; opacity: 0.5; }
        .blob-1 { top: -10%; left: -5%; width: 300px; height: 300px; background: rgba(56, 122, 255, 0.4); }
        .blob-2 { bottom: -10%; right: -5%; width: 400px; height: 400px; background: rgba(142, 45, 226, 0.3); }
        
        header { 
            height: 70px; 
            border-bottom: 1px solid var(--glass-border); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 40px; 
            background: var(--glass-bg);
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            flex-shrink: 0; z-index: 10; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        
        .brand { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; color: var(--dark-text); text-decoration: none; letter-spacing: -0.5px; }
        .brand i { margin-right: 8px; font-size: 1.6rem;}
        .brand span { color: var(--primary-blue); margin: 0; }

        .btn-home { 
            display: flex; align-items: center; gap: 8px; font-size: 0.95rem; font-weight: 600; 
            color: var(--dark-text); text-decoration: none; padding: 10px 20px; border-radius: 50px; 
            transition: 0.3s; background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
        }
        .btn-home:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.05);}

        .main-container { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 900px; margin: 0 auto; position: relative; }
        
        .chat-box { 
            flex: 1; 
            padding: 40px 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            scroll-behavior: smooth;
        }
        
        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        
        /* === СЕТКА СООБЩЕНИЙ === */
        .message-row { display: flex; align-items: flex-end; gap: 12px; width: 100%; animation: fadeIn 0.3s ease-out; }
        .message-row.ai { justify-content: flex-start; }
        .message-row.user { justify-content: flex-end; }
        
        .avatar { 
            width: 40px; height: 40px; min-width: 40px; min-height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 1.2rem; flex-shrink: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            object-fit: cover; background: #fff;
        }
        .ai .avatar { background: var(--primary-blue); color: white; }
        .user .avatar { border: 2px solid white; }

        .bubble { 
            padding: 14px 20px; border-radius: 20px; font-size: 1rem; line-height: 1.5; 
            position: relative; word-wrap: break-word; font-weight: 400; 
            max-width: 75%;
            width: fit-content;
        }
        
        .ai .bubble { 
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.9); border-bottom-left-radius: 4px; 
            color: var(--dark-text); box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }
        
        .user .bubble { 
            background: var(--primary-blue); color: white; 
            border-bottom-right-radius: 4px; box-shadow: 0 8px 25px rgba(56, 122, 255, 0.3); 
        }

        .ai .bubble pre { background: #1d1d1f; color: #fff; padding: 15px; border-radius: 12px; margin: 10px 0; overflow-x: auto; font-family: monospace; font-size: 0.9rem;}
        .ai .bubble code { background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; color: var(--primary-blue);}
        .ai .bubble p { margin-bottom: 10px; }
        .ai .bubble p:last-child { margin-bottom: 0; }
        .ai .bubble ul { padding-left: 20px; margin-bottom: 10px;}

        .input-area { padding: 30px; background: transparent; position: relative; z-index: 10;}
        
        .input-wrapper { 
            position: relative; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.8); border-radius: 50px; padding: 8px 8px 8px 30px; 
            display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s; 
        }
        .input-wrapper:focus-within { border-color: var(--primary-blue); background: rgba(255,255,255,0.9); }
        
        input[type="text"] { flex: 1; border: none; outline: none; font-size: 1.05rem; font-family: 'Lexend', sans-serif; background: transparent; color: var(--dark-text); }
        input[type="text"]::placeholder { color: #999; }
        
        .send-btn { 
            width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--primary-blue); color: white; 
            font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            transition: 0.3s; flex-shrink: 0; box-shadow: 0 5px 15px rgba(56, 122, 255, 0.3);
        }
        .send-btn:hover { background: #1a5cff; transform: scale(1.08) rotate(-10deg); }
        
        /* === КНОПКА СКРОЛЛА ВНИЗ === */
        .scroll-btn {
            position: absolute;
            bottom: 100px;
            right: 30px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            color: var(--primary-blue);
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            opacity: 0;
            pointer-events: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }
        .scroll-btn.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(-10px);
        }
        .scroll-btn:hover {
            background: #fff;
            color: #1a5cff;
            transform: translateY(-15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: var(--gray-text); }
        .empty-icon { font-size: 4rem; color: var(--primary-blue); margin-bottom: 20px; opacity: 0.8; animation: float 3s ease-in-out infinite;}
        
        .loading { display: flex; align-items: center; gap: 8px; color: var(--gray-text); font-size: 0.9rem; font-weight: 500; margin-left: 55px; animation: pulse 1.5s infinite;}
        .dot-flashing { width: 6px; height: 6px; border-radius: 5px; background-color: var(--primary-blue); animation: dotFlashing 1s infinite linear alternate; animation-delay: 0.5s; }
        .dot-flashing::before, .dot-flashing::after { content: ''; display: inline-block; position: absolute; top: 0; }
        .dot-flashing::before { left: -10px; width: 6px; height: 6px; border-radius: 5px; background-color: var(--primary-blue); animation: dotFlashing 1s infinite alternate; animation-delay: 0s; }
        .dot-flashing::after { left: 10px; width: 6px; height: 6px; border-radius: 5px; background-color: var(--primary-blue); animation: dotFlashing 1s infinite alternate; animation-delay: 1s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        @keyframes dotFlashing { 0% { background-color: var(--primary-blue); } 50%, 100% { background-color: rgba(56, 122, 255, 0.2); } }
    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <header>
        <a href="/ai" class="brand">
            <i class="ph-fill ph-sparkle" style="color:var(--primary-blue)"></i>
            rock<span>.</span>ai
        </a>
        <a href="/" class="btn-home"><i class="ph-fill ph-house"></i> Network</a>
    </header>

    <main class="main-container">
        <div class="chat-box" id="chatBox">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon"><i class="ph-fill ph-planet"></i></div>
                <h2 style="color:var(--dark-text); margin-bottom: 10px; font-weight: 800; letter-spacing: -0.5px;">Welcome to rock.ai</h2>
                <p>I'm your personal assistant on Haunted Rock.<br>Ask me anything.</p>
            </div>
        </div>

        <button id="scrollBtn" class="scroll-btn" onclick="scrollToBottom()" title="Scroll to bottom">
            <i class="ph-bold ph-arrow-down"></i>
        </button>

        <div class="input-area">
            <form class="input-wrapper" id="chatForm">
                <input type="text" id="userInput" placeholder="Message rock.ai..." autocomplete="off">
                <button type="submit" class="send-btn"><i class="ph-fill ph-paper-plane-right"></i></button>
            </form>
        </div>
    </main>

    <script>
        const chatBox = document.getElementById('chatBox');
        const emptyState = document.getElementById('emptyState');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const scrollBtn = document.getElementById('scrollBtn');
        const chatId = 'session_' + Date.now();
        let history = [];

        const userName = localStorage.getItem('haunted_user');
        
        // По умолчанию ставим твой файл user.jpg
        let userAvatar = '/user.jpg'; 

        async function fetchMyAvatar() {
            try {
                const response = await fetch('/api/users');
                const users = await response.json();
                const me = users.find(u => u.username === userName);
                if (me && me.avatar && me.avatar.trim() !== '') {
                    userAvatar = me.avatar;
                }
            } catch (error) { console.error("Avatar fetch error", error); }
        }
        fetchMyAvatar();

        // Показ и скрытие кнопки скролла
        chatBox.addEventListener('scroll', () => {
            const distanceFromBottom = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight;
            if (distanceFromBottom > 150) {
                scrollBtn.classList.add('show');
            } else {
                scrollBtn.classList.remove('show');
            }
        });

        // Функция ЖЕЛЕЗОБЕТОННОГО скролла вниз
        function scrollToBottom() { 
            setTimeout(() => {
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 100);
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            if (emptyState) emptyState.style.display = 'none';

            addMessage(text, 'user');
            userInput.value = '';

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading message-row ai';
            loadingDiv.innerHTML = `<div class="avatar"><i class="ph-fill ph-sparkle"></i></div><div style="position: relative; height: 6px; margin-left: 15px;"><div class="dot-flashing"></div></div>`;
            chatBox.appendChild(loadingDiv);
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, history: history, chatId: chatId, username: userName })
                });

                const data = await response.json();
                if(loadingDiv.parentNode) chatBox.removeChild(loadingDiv);

                if (data.reply) {
                    addMessage(data.reply, 'ai');
                    history.push({ role: "user", content: text });
                    history.push({ role: "assistant", content: data.reply });
                    if(history.length > 10) history = history.slice(-10);
                }
            } catch (error) {
                if(loadingDiv.parentNode) chatBox.removeChild(loadingDiv);
                addMessage("Signal lost. Cannot connect to the neural net.", 'ai');
            }
        });

        function addMessage(text, sender) {
            const row = document.createElement('div');
            row.className = `message-row ${sender}`;
            
            if (sender === 'ai') {
                const formattedText = marked.parse(text);
                row.innerHTML = `<div class="avatar"><i class="ph-fill ph-sparkle"></i></div><div class="bubble">${formattedText}</div>`;
            } else {
                const safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, '<br>');
                row.innerHTML = `<div class="bubble">${safeText}</div><img src="${userAvatar}" class="avatar" alt="User">`;
            }
            
            chatBox.appendChild(row);
            scrollToBottom();
        }
    </script>
</body>
</html>
