<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haunted Rock</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --primary-blue: rgb(56, 122, 255); 
            --dark-text: #1d1d1f;
            --gray-text: #86868b;
            --fixer-purple: #8e2de2;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e8ecf2 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            --blur: blur(20px);
            --danger: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Lexend', sans-serif; background: var(--bg-gradient); 
            color: var(--dark-text); line-height: 1.6; font-weight: 300; min-height: 100vh;
        }

        a { text-decoration: none; color: inherit; transition: 0.3s; }
        img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* HEADER */
        header { 
            background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            padding: 15px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02); 
        }
        .nav-container { max-width: 1240px; margin: 0 auto; padding: 0 25px; display: flex; justify-content: space-between; align-items: center; }
        
        .brand { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 42px; height: 42px; object-fit: cover; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--dark-text); letter-spacing: -0.5px; text-transform: lowercase; }
        .logo-text span { color: var(--primary-blue); margin: 0 1px; }

        nav ul { display: flex; list-style: none; gap: 25px; align-items: center;}
        nav a { font-weight: 500; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-text); }
        nav a:hover { color: var(--primary-blue); }

        .header-actions { display: flex; align-items: center; gap: 20px; }
        .icon-btn { font-size: 1.4rem; cursor: pointer; transition: 0.2s; display: flex; color: var(--dark-text); background: none; border: none; font-family: inherit;}
        .icon-btn:hover { color: var(--primary-blue); transform: scale(1.1); }
        
        .profile-wrapper { width: 45px; height: 45px; border-radius: 50%; padding: 2px; border: 2px solid transparent; transition: 0.3s; cursor: pointer; position: relative; }
        .profile-wrapper:hover { border-color: var(--primary-blue); }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #eee;}

        /* MAIN LAYOUT */
        .main-layout { max-width: 1240px; margin: 40px auto; padding: 0 25px; display: grid; grid-template-columns: 2fr 1fr; gap: 40px; align-items: start; }
        .feed-section h2 { margin-bottom: 20px; font-weight: 700; font-size: 1.8rem; letter-spacing: -0.5px; }

        .glass-panel { background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: var(--shadow); }

        .post-card { padding: 25px; margin-bottom: 30px; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .post-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }

        .post-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .post-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .post-info h3 { font-size: 1.05rem; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 6px; }
        .verified-creator { color: var(--primary-blue); font-size: 1.1rem; }
        .verified-fixer { color: var(--fixer-purple); font-size: 1.1rem; }
        .post-info span { font-size: 0.85rem; color: var(--gray-text); }
        
        .delete-btn { margin-left: auto; color: var(--danger); background: none; border: none; font-size: 1.3rem; cursor: pointer; transition: 0.2s; padding: 5px; border-radius: 8px; display: flex; align-items: center; justify-content: center;}
        .delete-btn:hover { background: rgba(255, 77, 77, 0.1); transform: scale(1.1); }

        .post-content { font-size: 1.05rem; color: #333; margin-bottom: 15px; line-height: 1.6; white-space: pre-wrap; font-weight: 400;}
        .post-image { width: 100%; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .post-video { width: 100%; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); outline: none; background: #000; height: 350px; border: none;}

        .post-actions { display: flex; gap: 20px; padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.05); }
        .action-btn { display: flex; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; font-size: 0.95rem; font-weight: 600; color: var(--gray-text); font-family: inherit; transition: 0.2s; }
        .action-btn:hover { color: var(--primary-blue); }
        .action-btn i { font-size: 1.3rem; transition: transform 0.2s; }
        
        .liked-btn i { color: var(--danger); animation: popHeart 0.3s ease forwards; }
        .liked-btn span { color: var(--danger); }
        @keyframes popHeart { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        /* USERS SIDEBAR */
        .users-sidebar { padding: 25px; position: sticky; top: 90px; }
        .sidebar-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .sidebar-title i { color: var(--primary-blue); }

        .user-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.03); transition: 0.2s;}
        .user-item:hover { transform: translateX(5px); }
        .user-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #eee; }
        .user-name { font-weight: 600; font-size: 0.95rem; color: var(--dark-text); }
        .user-badge { font-size: 0.75rem; color: var(--gray-text); display: block; }
        .creator-badge { color: var(--primary-blue); font-weight: 700; }
        .fixer-badge { color: var(--fixer-purple); font-weight: 700; }

        /* MODALS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); animation: fadeIn 0.3s; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.6); width: 400px; padding: 40px; border-radius: 30px; position: relative; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.15); transform: scale(0.9); animation: popIn 0.3s forwards; }
        
        .modal-avatar-wrapper { width: 110px; height: 110px; margin: 0 auto 15px auto; padding: 5px; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .modal-avatar-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .menu-btn { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 14px; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1rem; color: var(--dark-text); transition: 0.2s; }
        .menu-btn:hover { background: rgba(255, 255, 255, 0.8); transform: translateY(-2px); color: var(--primary-blue); }
        .btn-confirm { background: var(--primary-blue); color: white; border: none; }
        .btn-danger:hover { background: #fff0f0; color: #e74c3c; border-color: transparent; }
        
        .admin-fab { position: fixed; bottom: 40px; right: 40px; width: 65px; height: 65px; background: var(--primary-blue); color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 10px 25px rgba(56, 122, 255, 0.4); cursor: pointer; z-index: 500; transition: 0.3s; }
        .admin-fab.fixer-btn { background: var(--fixer-purple); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="/" class="brand">
                <img src="logo.jpg" alt="Logo" class="logo-img">
                <div class="logo-text">haunted<span>.</span>rock</div>
            </a>
            <nav>
                <ul>
                    <li><a href="/ai" class="icon-btn" style="color:var(--primary-blue); font-weight:700;"><i class="ph-fill ph-sparkle"></i> rock.ai</a></li>
                    <li><a href="/about">About</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <div class="profile-wrapper" id="headerAvatarWrapper" onclick="openProfileModal()">
                    <img id="userAvatar" src="" class="profile-img">
                </div>
            </div>
        </div>
    </header>

    <div class="admin-fab" id="adminBtn" onclick="openPostModal()">
        <i class="ph ph-pen-nib"></i>
    </div>

    <div class="main-layout">
        <div class="feed-section">
            <h2 id="welcomeMsg">Latest Rocks</h2>
            <div id="feedContainer"></div>
        </div>

        <aside class="users-sidebar glass-panel">
            <div class="sidebar-title"><i class="ph-fill ph-users-three"></i> Community</div>
            <div id="usersList"></div>
        </aside>
    </div>

    <div class="modal-overlay" id="profileModal" onclick="if(event.target.id==='profileModal') this.classList.remove('active')">
        <div class="modal-card">
            <div class="modal-avatar-wrapper"><img id="modalAvatar" src=""></div>
            <h2 id="profileName" style="margin-bottom: 5px;">User</h2>
            <span id="profileRole" style="color:var(--gray-text); display:block; margin-bottom: 30px;">Explorer</span>
            
            <button class="menu-btn" onclick="document.getElementById('fileInput').click()">
                <i class="ph ph-image"></i> Change Avatar
            </button>
            <button class="menu-btn btn-danger" onclick="logout()">
                <i class="ph ph-sign-out"></i> Log Out
            </button>
        </div>
    </div>

    <input type="file" id="fileInput" hidden accept="image/*" onchange="changeAvatar(this)">

    <script>
        const userName = localStorage.getItem('haunted_user');
        if (!userName) window.location.href = '/reg';

        // 1. ПЕРВИЧНАЯ НАСТРОЙКА ИНТЕРФЕЙСА
        document.getElementById('profileName').innerText = userName;
        const adminBtn = document.getElementById('adminBtn');
        const roleText = document.getElementById('profileRole');

        if (userName === 'Haunted Rock') { 
            adminBtn.style.display = 'flex';
            roleText.innerText = 'THE CREATOR 👑';
            roleText.style.color = 'var(--primary-blue)';
        } else if (userName === 'M1rMak') {
            adminBtn.style.display = 'flex';
            adminBtn.classList.add('fixer-btn');
            roleText.innerText = 'THE FIXER 🛠️';
            roleText.style.color = 'var(--fixer-purple)';
        }

        // 2. ФУНКЦИЯ ЗАГРУЗКИ МОЕЙ АВАТАРКИ
        async function fetchMyAvatar() {
            try {
                const response = await fetch('/api/users');
                const users = await response.json();
                const me = users.find(u => u.username === userName);
                
                // Если в базе есть аватарка — ставим её, если нет — генерируем временную
                const finalAvatar = (me && me.avatar) ? me.avatar : `https://ui-avatars.com/api/?name=${userName}&background=random&color=fff`;
                
                document.getElementById('userAvatar').src = finalAvatar;
                document.getElementById('modalAvatar').src = finalAvatar;
            } catch (error) {
                console.error("Ошибка при получении аватарки:", error);
            }
        }

        // 3. ФУНКЦИЯ ИЗМЕНЕНИЯ АВАТАРКИ (СОХРАНЕНИЕ В БАЗУ)
        function changeAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const base64 = e.target.result;
                    
                    try {
                        // ОТПРАВЛЯЕМ НА СЕРВЕР (адрес /api/avatar)
                        const response = await fetch('/api/avatar', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                username: userName, 
                                avatar: base64 
                            })
                        });
                        
                        const result = await response.json();
                        if (result.success) {
                            // Если сервер сохранил — обновляем картинки на странице без перезагрузки
                            document.getElementById('userAvatar').src = base64;
                            document.getElementById('modalAvatar').src = base64;
                            loadUsers(); // Обновляем список пользователей сбоку
                        } else {
                            alert("Ошибка сохранения: " + result.message);
                        }
                    } catch (error) {
                        console.error("Ошибка при отправке аватарки:", error);
                    }
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 4. ЗАГРУЗКА СПИСКА ПОЛЬЗОВАТЕЛЕЙ
        async function loadUsers() {
            const list = document.getElementById('usersList');
            try {
                const response = await fetch('/api/users');
                const realUsers = await response.json();
                list.innerHTML = '';
                realUsers.forEach(u => {
                    const avatar = u.avatar || `https://ui-avatars.com/api/?name=${u.username}&background=random&color=fff`;
                    let badgeClass = u.username === 'Haunted Rock' ? 'creator-badge' : (u.username === 'M1rMak' ? 'fixer-badge' : '');
                    let badgeText = u.username === 'Haunted Rock' ? 'Creator' : (u.username === 'M1rMak' ? 'Fixer' : 'Member');
                    
                    list.innerHTML += `
                        <div class="user-item">
                            <img src="${avatar}" class="user-pic">
                            <div>
                                <div class="user-name">${u.username}</div>
                                <span class="user-badge ${badgeClass}">${badgeText}</span>
                            </div>
                        </div>`;
                });
            } catch (error) { console.error("Error loading users:", error); }
        }

        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        function openProfileModal() { document.getElementById('profileModal').classList.add('active'); }
        function logout() { localStorage.removeItem('haunted_user'); window.location.href = '/reg'; }

        // ЗАПУСК ПРИ ЗАГРУЗКЕ
        fetchMyAvatar();
        loadUsers();
    </script>
</body>
</html>
